<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerencia das Tecnologias</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="tecnologias.module.css">
</head>
<body>
    <div class="container">
  <div style="display:flex;justify-content:space-between;align-items:center;">
    <h1>Tecnologias</h1>
    <button class="primary-btn" onclick="openModal()">Adicionar Tecnologia</button>
  </div>

  <div class="filters">
    <input class="search" placeholder="Pesquisar..." oninput="render()">
    <div class="categories"></div>
  </div>

  <div class="grid" id="grid"></div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modalTitle">Nova Tecnologia</h3>
    <input id="name" placeholder="Nome">
    <input id="icon" placeholder="Ícone (emoji)">
    <select id="category"></select>
    <select id="level">
      <option>Básico</option>
      <option>Intermediário</option>
      <option>Avançado</option>
    </select>
    <textarea id="description" placeholder="Descrição"></textarea>

    <div class="modal-buttons">
      <button onclick="closeModal()">Cancelar</button>
      <button class="primary-btn" onclick="save()">Salvar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
      card.innerHTML=`
        <div class="card-header">
          <div style="display:flex;gap:10px;">
            <div class="icon-box">${t.icon}</div>
            <div>
              <strong>${t.name}</strong><br>
              <small>${t.category}</small>
            </div>
          </div>
          <span class="badge">${t.level}</span>
        </div>
        <p>${t.description}</p>
        <div class="actions">
          <button onclick="edit(${t.id})">Editar</button>
          <button onclick="removeTech(${t.id})">Excluir</button>
        </div>
      `;
      grid.appendChild(card);
    });
}
</script>
</body>
</html>
